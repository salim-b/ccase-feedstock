context:
  version: "0.5.1"

package:
  name: ccase
  version: ${{ version }}

source:
  url: https://github.com/stringcase/ccase/archive/refs/tags/${{ version }}.tar.gz
  sha256: 3ec9ba72aa8697bbf4ff2a03c57be0ce6236902959f799bc561e482ed50b91a3

build:
  number: 1
  script:
    env:
      CARGO_PROFILE_RELEASE_LTO: fat
      CARGO_PROFILE_RELEASE_STRIP: symbols
    content:
      - if: unix
        then:
          - cargo auditable install --no-track --locked --bins --root="$PREFIX" --path=.
      - if: win
        then:
          - cargo auditable install --no-track --locked --bins --root="%LIBRARY_PREFIX%" --path=.
      - cargo-bundle-licenses --format=yaml --output=./THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-auditable
    - cargo-bundle-licenses

tests:
  - script:
      - ccase --help
      - ccase --version
  - package_contents:
      bin:
        - ccase
      strict: true

about:
  summary: Command line interface to convert strings into any case
  description: |
    ccase is a command line utility for converting between string cases such as
    snake_case, kebab-case, camelCase, PascalCase, Title Case, and many more.
    It is built on top of the `convert_case` Rust library.
  license: MIT
  license_file:
    - LICENSE.md
    - THIRDPARTY.yml
  homepage: https://github.com/stringcase/ccase
  repository: https://github.com/stringcase/ccase

extra:
  recipe-maintainers:
    - salim-b
